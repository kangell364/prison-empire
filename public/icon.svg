<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2a"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6dc8c"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#7d5d10"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#5a420c"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed dark background (works as maskable on Android) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle concentric rings for depth -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.18"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.10"/>

  <!-- Crown — centered in safe zone (within central 80%) -->
  <g transform="translate(256, 270)">
    <!-- Crown body: 5 peaks (M, V, M, V, M shape) -->
    <path d="M -160 -50
             L -110 50
             L -55 -100
             L 0 60
             L 55 -100
             L 110 50
             L 160 -50
             L 140 100
             L -140 100 Z"
          fill="url(#gold)"
          stroke="#3a2a08"
          stroke-width="3"
          stroke-linejoin="round"/>

    <!-- Inner highlight on body for depth -->
    <path d="M -150 -40
             L -110 35
             L -55 -85
             L 0 45
             L 55 -85
             L 110 35
             L 150 -40"
          fill="none"
          stroke="#fce9a8"
          stroke-width="1.5"
          opacity="0.6"
          stroke-linejoin="round"/>

    <!-- Crown band beneath -->
    <rect x="-150" y="90" width="300" height="38" rx="6"
          fill="url(#goldDark)"
          stroke="#3a2a08"
          stroke-width="3"/>

    <!-- Band ornament dots -->
    <circle cx="-100" cy="109" r="3" fill="#3a2a08"/>
    <circle cx="-50"  cy="109" r="3" fill="#3a2a08"/>
    <circle cx="50"   cy="109" r="3" fill="#3a2a08"/>
    <circle cx="100"  cy="109" r="3" fill="#3a2a08"/>

    <!-- Jewels on crown peaks -->
    <circle cx="-110" cy="40"  r="14" fill="#e74c3c" stroke="#3a2a08" stroke-width="2"/>
    <circle cx="-110" cy="36"  r="4"  fill="#ffb0a0" opacity="0.8"/>

    <circle cx="0"    cy="50"  r="18" fill="#a855f7" stroke="#3a2a08" stroke-width="2"/>
    <circle cx="0"    cy="44"  r="5"  fill="#e0b8ff" opacity="0.8"/>

    <circle cx="110"  cy="40"  r="14" fill="#4a9eff" stroke="#3a2a08" stroke-width="2"/>
    <circle cx="110"  cy="36"  r="4"  fill="#b8d8ff" opacity="0.8"/>
  </g>
</svg>
